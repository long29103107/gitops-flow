apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-base.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "backend-base.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "backend-base.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
